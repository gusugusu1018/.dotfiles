##### シェル設定 #####
# デフォルトシェルを zsh にする（必要なら有効化）
# set-option -g default-shell /usr/bin/zsh


##### プレフィックスキー設定 #####
# プレフィックスキーを Ctrl-q に変更
set -g prefix C-q
# デフォルトの Ctrl-b を無効化
unbind C-b


##### インデックス設定 #####
# ウィンドウ番号を 1 始まりにする
set -g base-index 1
# ペイン番号を 1 始まりにする
setw -g pane-base-index 1


##### 設定ファイルの再読み込み #####
# Prefix + r で ~/.tmux.conf を再読み込み
bind r source-file ~/.tmux.conf \; display "Reloaded!"


##### コピーモード設定 #####

# クリップボード連携ON
set -g set-clipboard on

# コピーモードのキーバインドを vi 風にする
set-window-option -g mode-keys vi

# Prefix + v でコピーモードに入る
bind-key v copy-mode \; display "Copy mode!"

# v で範囲選択開始（vi 風）
bind-key -T copy-mode-vi v send-keys -X begin-selection

# y で選択範囲をコピーしてコピーモード終了（macOS 用）
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Enter でもコピーして終了
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Prefix + p で貼り付け
bind-key p paste-buffer


##### ターミナル・カラー設定 #####
# 256 色対応ターミナルとして扱う
set -g default-terminal "screen-256color"

# ステータスバーの文字色・背景色
set -g status-fg white
set -g status-bg black

# ペインの境界線（非アクティブ）の色設定
set -g pane-border-style fg=colour240

# アクティブなペインの境界線の色設定g
set -g pane-active-border-style fg=cyan

##### メッセージ表示設定 #####
# コマンド実行時のメッセージ色（必要なら有効化）
# set -g message-fg white
# set -g message-bg black
# set -g message-attr bright


##### ステータスバー設定 #####
# ステータスバーを上部に表示
set-option -g status-position top

# 左側ステータス表示設定
set -g status-left-length 90
set-option -g status-left '#[fg=green]#H #[fg=cyan]pane:#P'

# 右側ステータス表示設定（日時）
set -g status-right-length 90
set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"

# ステータス更新間隔（秒）
# set -g status-interval 60

##### マウス操作 #####
# マウスでスクロール・ペイン操作を有効化
set -g mouse on

##### ペインサイズ変更 #####
# Prefix + h/j/k/l でペインサイズを変更（押しっぱなし可）
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
